<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="//libtl.com/sdk.js"
        data-zone="11121391"
        data-sdk="show_11121391"></script>

<title>🏀 Juego de Canasta</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    background:#87CEEB;
    overflow:hidden;
}

#info{
    padding:10px;
    font-size:22px;
    font-weight:bold;
}

#campo{
    position:relative;
    width:100vw;
    height:80vh;
}

#canasta{
    position:absolute;
    width:120px;
    height:80px;
    font-size:70px;
    cursor:pointer;
    user-select:none;
}
</style>
</head>
<body>

<div id="info">
🏀 Nivel: <span id="nivel">1</span> |
Puntos: <span id="puntos">0</span>/<span id="objetivo">3</span>
</div>

<div id="campo">
    <div id="canasta">🧺</div>
</div>

<script>
let nivel = 1;
let puntos = 0;
let objetivo = 3;

const canasta = document.getElementById("canasta");

function moverCanasta() {
    const ancho = window.innerWidth - 140;
    const alto = window.innerHeight - 220;

    canasta.style.left = Math.random() * ancho + "px";
    canasta.style.top = Math.random() * alto + "px";
}

function actualizar() {
    document.getElementById("nivel").textContent = nivel;
    document.getElementById("puntos").textContent = puntos;
    document.getElementById("objetivo").textContent = objetivo;
}

canasta.addEventListener("click", () => {

    puntos++;

    actualizar();

    moverCanasta();

    if (puntos >= objetivo) {
        completarNivel();
    }
});

function completarNivel() {

    show_11121391()
    .then(() => {

        nivel++;
        puntos = 0;
        objetivo += 2;

        actualizar();

        alert("🎉 Pasaste al nivel " + nivel);

        moverCanasta();

    })
    .catch(() => {

        nivel++;
        puntos = 0;
        objetivo += 2;

        actualizar();

        moverCanasta();
    });
}

moverCanasta();
actualizar();
</script>

</body>
</html>
