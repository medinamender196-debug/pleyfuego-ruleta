<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta con Niveles</title>

<!-- 🔥 MONETAG SDK -->
<script src='//libtl.com/sdk.js' data-zone='11121391' data-sdk='show_11121391'></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
}

#wheel {
    width: 200px;
    height: 200px;
    background: gold;
    border-radius: 50%;
    margin: 30px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    transition: transform 4s ease-out;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    cursor: pointer;
}

#result {
    margin-top: 20px;
    font-size: 22px;
}

#stats {
    margin-top: 20px;
    background: white;
    display: inline-block;
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h2>🎡 Ruleta con Recompensas</h2>

<div id="wheel">🎡</div>

<button onclick="spin()">GIRAR</button>

<div id="result"></div>

<div id="stats">
    <p>💰 Puntos: <span id="points">0</span></p>
    <p>📊 Nivel: <span id="level">1</span></p>
</div>

<script>

// 🔥 cargar datos guardados
let points = parseInt(localStorage.getItem("points")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;

updateUI();

// 📊 actualizar pantalla
function updateUI() {
    document.getElementById("points").innerText = points;
    document.getElementById("level").innerText = level;
}

// 💰 agregar puntos
function addPoints(amount) {
    points += amount;

    let newLevel = Math.floor(points / 100) + 1;

    if (newLevel > level) {
        level = newLevel;
        alert("🎉 Subiste al nivel " + level + "!");
    }

    localStorage.setItem("points", points);
    localStorage.setItem("level", level);

    updateUI();
}

// 🎡 RULETA + MONETAG
function spin() {

    if (typeof window.show_11121391 !== "function") {
        alert("⚠️ El anuncio aún no está listo. Intenta en unos segundos.");
        return;
    }

    window.show_11121391('pop')
        .then(() => {

            let deg = Math.floor(Math.random() * 360) + 1800;

            const wheel = document.getElementById("wheel");
            const result = document.getElementById("result");

            wheel.style.transform = "rotate(" + deg + "deg)";

            setTimeout(() => {

                const premios = [
                    "10 puntos",
                    "25 puntos",
                    "50 puntos",
                    "100 puntos",
                    "200 puntos",
                    "Sigue intentando"
                ];

                let premio = premios[Math.floor(Math.random() * premios.length)];

                let reward = 0;

                switch (premio) {
                    case "10 puntos": reward = 10; break;
                    case "25 puntos": reward = 25; break;
                    case "50 puntos": reward = 50; break;
                    case "100 puntos": reward = 100; break;
                    case "200 puntos": reward = 200; break;
                    default: reward = 0;
                }

                addPoints(reward);

                result.innerHTML = "🎉 Ganaste: " + premio;

            }, 4000);

        })
        .catch(() => {
            alert("❌ No hay anuncios disponibles ahora.");
        });
}

</script>

</body>
</html>
