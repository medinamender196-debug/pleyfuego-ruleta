<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta Pro</title>
<script src='//libtl.com/sdk.js' data-zone='11121391' data-sdk='show_11121391'></script>
<style>
body{font-family:Arial,sans-serif;background:#eef3f8;margin:0;padding:20px;text-align:center}
.card{background:#fff;border-radius:16px;padding:16px;margin:12px auto;max-width:500px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
#wheel{width:220px;height:220px;border-radius:50%;margin:20px auto;display:flex;align-items:center;justify-content:center;
background:conic-gradient(#ff6b6b 0 60deg,#ffd93d 60deg 120deg,#6bcB77 120deg 180deg,#4d96ff 180deg 240deg,#b983ff 240deg 300deg,#ff8fab 300deg 360deg);
font-size:48px;transition:transform 4s ease-out}
button{padding:12px 18px;border:none;border-radius:10px;cursor:pointer}
.progress{height:18px;background:#ddd;border-radius:10px;overflow:hidden}
.bar{height:100%;width:0%;background:#4d96ff}
</style>
</head>
<body>
<div class="card">
<h2>🎡 Ruleta Pro</h2>
<div id="wheel">🎡</div>
<button onclick="spin()">GIRAR</button>
<p id="result"></p>
</div>

<div class="card">
<h3>📊 Progreso</h3>
<p>💰 Puntos: <span id="points">0</span></p>
<p>⭐ Nivel: <span id="level">1</span></p>
<div class="progress"><div class="bar" id="xpBar"></div></div>
</div>

<div class="card">
<h3>🎁 Recompensa diaria</h3>
<button onclick="dailyReward()">Reclamar</button>
</div>

<div class="card">
<h3>🛒 Tienda</h3>
<button onclick="buy(200,'Giro VIP')">Giro VIP (200)</button>
<button onclick="buy(500,'Caja Misteriosa')">Caja (500)</button>
<p id="shopMsg"></p>
</div>

<script>
let points=parseInt(localStorage.getItem('points')||0);
let level=parseInt(localStorage.getItem('level')||1);
let spins=parseInt(localStorage.getItem('spins')||0);

function updateUI(){
 document.getElementById('points').textContent=points;
 document.getElementById('level').textContent=level;
 let pct=(points%100);
 document.getElementById('xpBar').style.width=pct+'%';
}
updateUI();

function addPoints(n){
 points+=n;
 let nl=Math.floor(points/100)+1;
 if(nl>level){level=nl;alert('🎉 Nivel '+level);}
 localStorage.setItem('points',points);
 localStorage.setItem('level',level);
 updateUI();
}

function doSpin(){
 let deg=Math.floor(Math.random()*360)+1800;
 wheel.style.transform='rotate('+deg+'deg)';
 setTimeout(()=>{
  let rewards=[10,25,50,100,200,0];
  let r=rewards[Math.floor(Math.random()*rewards.length)];
  addPoints(r);
  result.textContent=r?('🎉 Ganaste '+r+' puntos'):('😅 Sigue intentando');
 },4000);
}

function spin(){
 spins++;
 localStorage.setItem('spins',spins);
 let adTurn=(spins%3===0);

 if(adTurn && typeof window.show_11121391==='function'){
   show_11121391('pop').then(()=>doSpin()).catch(()=>doSpin());
 }else{
   doSpin();
 }
}

function dailyReward(){
 let last=localStorage.getItem('daily');
 let today=new Date().toDateString();
 if(last===today){alert('Ya reclamaste hoy');return;}
 localStorage.setItem('daily',today);
 addPoints(100);
 alert('🎁 +100 puntos');
}

function buy(cost,item){
 if(points<cost){shopMsg.textContent='❌ No tienes suficientes puntos';return;}
 points-=cost;
 localStorage.setItem('points',points);
 updateUI();
 if(item==='Caja Misteriosa'){
   let prize=[100,250,500,1000][Math.floor(Math.random()*4)];
   addPoints(prize);
   shopMsg.textContent='📦 Caja: '+prize+' puntos';
 }else{
   shopMsg.textContent='✅ Compraste '+item;
 }
}
</script>
</body>
</html>
