<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monetag Ads Demo</title>

<!-- Monetag SDK -->
<script src="//libtl.com/sdk.js"
        data-zone="11121391"
        data-sdk="show_11121391"></script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    padding:40px;
    background:#f5f5f5;
}
button{
    padding:12px 20px;
    margin:10px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
<body>

<h2>💰 Monetag Rewarded Ads</h2>

<button onclick="rewardedAd()">
🎁 Rewarded Interstitial
</button>

<button onclick="rewardedPopup()">
🎉 Rewarded Popup
</button>

<script>
// ===============================
// REWARDED INTERSTITIAL
// ===============================
function rewardedAd() {

    show_11121391()
    .then(() => {

        // Recompensa al usuario
        alert("✅ Ganaste 100 monedas");

    })
    .catch(() => {

        alert("❌ No se pudo mostrar el anuncio");

    });

}

// ===============================
// REWARDED POPUP
// ===============================
function rewardedPopup() {

    show_11121391('pop')
    .then(() => {

        // Recompensa al usuario
        alert("✅ Ganaste 50 monedas");

    })
    .catch(() => {

        alert("❌ Error al mostrar el anuncio");

    });

}

// ===============================
// IN-APP INTERSTITIAL AUTOMÁTICO
// ===============================
show_11121391({
    type: 'inApp',
    inAppSettings: {
        frequency: 2,
        capping: 0.1,
        interval: 30,
        timeout: 5,
        everyPage: false
    }
});
</script>

</body>
</html>
let nivel = 1;
let puntos = 0;
let objetivo = 3;

function encestar() {
    puntos++;

    if (puntos >= objetivo) {
        completarNivel();
    }
}

function completarNivel() {

    show_11121391()
    .then(() => {

        nivel++;
        puntos = 0;
        objetivo += 2;

        alert("🏀 Nivel " + nivel);

    });
}
