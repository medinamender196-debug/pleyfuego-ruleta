<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta con Monetag</title>

<!-- 🔥 MONETAG SCRIPT (OBLIGATORIO) -->
<script src="https://a.monetag.com/tag.min.js"></script>

<style>
    body {
        font-family: Arial;
        text-align: center;
        background: #f5f5f5;
    }

    #wheel {
        width: 200px;
        height: 200px;
        background: gold;
        border-radius: 50%;
        margin: 40px auto;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 50px;
        transition: transform 4s ease-out;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        cursor: pointer;
    }

    #result {
        margin-top: 20px;
        font-size: 22px;
    }
</style>
</head>

<body>

<h2>🎡 Ruleta de Premios</h2>

<div id="wheel">🎡</div>

<button onclick="spin()">GIRAR</button>

<div id="result"></div>

<script>
function spin() {

    // 🚨 Verifica Monetag cargado
    if (typeof window.show_11121391 !== "function") {
        alert("⚠️ El anuncio aún no está listo. Intenta en unos segundos.");
        return;
    }

    // 🎬 Mostrar Rewarded Popup
    window.show_11121391('pop')
        .then(() => {

            // 🎡 Girar ruleta SOLO si vio el anuncio

            let deg = Math.floor(Math.random() * 360) + 1800;

            const wheel = document.getElementById("wheel");
            const result = document.getElementById("result");

            wheel.style.transform = "rotate(" + deg + "deg)";

            setTimeout(() => {

                const premios = [
                    "10 puntos",
                    "25 puntos",
                    "50 puntos",
                    "100 puntos",
                    "200 puntos",
                    "Sigue intentando"
                ];

                let premio = premios[Math.floor(Math.random() * premios.length)];

                result.innerHTML = "🎉 Ganaste: " + premio;

            }, 4000);

        })
        .catch(() => {
            alert("❌ No se pudo mostrar el anuncio. Intenta más tarde.");
        });

}
</script>

</body>
</html>
