<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Canasta</title>

<!-- Monetag -->
<script src="//libtl.com/sdk.js"
        data-zone="11121391"
        data-sdk="show_11121391"></script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f2f2f2;
    padding:20px;
}

button{
    padding:15px 25px;
    font-size:20px;
    cursor:pointer;
}

.info{
    font-size:24px;
    margin:15px;
}
</style>
</head>
<body>

<h1>🏀 Juego de Canasta</h1>

<div class="info">
Nivel: <span id="nivel">1</span>
</div>

<div class="info">
Puntos: <span id="puntos">0</span> /
<span id="objetivo">3</span>
</div>

<button onclick="encestar()">
🏀 Lanzar Pelota
</button>

<script>
let nivel = 1;
let puntos = 0;
let objetivo = 3;

function actualizarPantalla() {
    document.getElementById("nivel").textContent = nivel;
    document.getElementById("puntos").textContent = puntos;
    document.getElementById("objetivo").textContent = objetivo;
}

function encestar() {
    puntos++;

    actualizarPantalla();

    if (puntos >= objetivo) {
        completarNivel();
    }
}

function completarNivel() {

    alert("🎉 Nivel completado");

    show_11121391()
    .then(() => {

        nivel++;
        puntos = 0;
        objetivo += 2;

        actualizarPantalla();

        alert("🏀 Bienvenido al nivel " + nivel);

    })
    .catch((error) => {

        console.log(error);

        // Si falla el anuncio, igualmente pasa de nivel
        nivel++;
        puntos = 0;
        objetivo += 2;

        actualizarPantalla();

        alert("🏀 Nivel " + nivel);

    });
}

actualizarPantalla();
</script>

</body>
</html>
